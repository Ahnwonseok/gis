server:
  port: 8443
  ssl:
    enabled: true
    # certificate.crt와 ca_bundle.crt를 합친 fullchain.crt 사용
    certificate: classpath:fullchain.crt
    certificate-private-key: classpath:private.key
  # HTTP를 HTTPS로 리다이렉트하기 위한 설정
  http:
    port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: gds0425!
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.type.descriptor.sql.BasicBinder: trace